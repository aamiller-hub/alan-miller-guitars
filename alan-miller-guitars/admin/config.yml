backend:
  name: git-gateway
  branch: main

media_folder: "alan-miller-guitars/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "guitars"
    label: "Guitars"
    folder: "alan-miller-guitars/content/guitars"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["for-sale", "sold"] }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "alan-miller-guitars/content/testimonials"
    create: true
    slug: "{{name}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Text", name: "text", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime" }
