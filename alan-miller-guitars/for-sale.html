<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guitars For Sale</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<h1>Available Guitars</h1>
<div id="for-sale"></div>

<h1>Previously Sold</h1>
<div id="sold"></div>

<script>
async function loadGuitars() {
  const res = await fetch('https://api.github.com/repos/aamiller-hub/alan-miller-guitars/contents/alan-miller-guitars/content/guitars');
  const files = await res.json();

  const forSale = document.getElementById('for-sale');
  const sold = document.getElementById('sold');

  for (const file of files) {
    if (!file.name.endsWith('.md')) continue;

    const contentRes = await fetch(file.download_url);
    const text = await contentRes.text();

    const getField = (field) => {
      const match = text.match(new RegExp(field + ':\\s*(.*)'));
      return match ? match[1].trim() : '';
    };

    const name = getField('name');
    const price = getField('price');
    const status = getField('status');
    const description = getField('description');

    let image = getField('image');

    // correct path for nested deployment
    if (image) {
      image = '/alan-miller-guitars' + image;
    }

    const el = document.createElement('div');
    el.className = 'guitar';

    el.innerHTML = `
      ${image ? `<img src="${image}" alt="${name}">` : ""}
      <div>
        <h3>${name}</h3>
        <p class="price">${price}</p>
        <p>${description}</p>
        ${status === 'sold' ? '<span class="badge">SOLD</span>' : ''}
      </div>
    `;

    if (status === 'for-sale') {
      forSale.appendChild(el);
    } else {
      sold.appendChild(el);
    }
  }
}

loadGuitars();
</script>

</body>
</html>
