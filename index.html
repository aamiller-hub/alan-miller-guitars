<style>

  /* ===================== */
  /* HOME HERO */
  /* ===================== */

  .home-hero {
    position: relative;

    width: 100%;
    height: calc(100vh - 140px);

    background: #b8b5b2;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;
  }

  .home-overlay {
    text-align: center;
    color: white;
    padding: 20px;
  }

  .home-overlay h1 {
    font-size: 58px;
    font-weight: 300;
    letter-spacing: 5px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .home-overlay p {
    font-size: 17px;
    letter-spacing: 2px;
    margin-bottom: 42px;
    opacity: 0.92;
  }

  .home-buttons {
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .home-button {
    display: inline-block;

    padding: 14px 30px;

    border: 1px solid rgba(255,255,255,0.75);

    color: white;
    text-decoration: none;

    letter-spacing: 2px;
    font-size: 12px;
    text-transform: uppercase;

    transition:
      background 0.25s ease,
      color 0.25s ease,
      border-color 0.25s ease;
  }

  .home-button:hover {
    background: white;
    color: #111;
    border-color: white;
  }

  /* ===================== */
  /* MOBILE */
  /* ===================== */

  @media (max-width: 768px) {

    .home-hero {
      height: calc(100vh - 110px);
    }

    .home-overlay h1 {
      font-size: 34px;
      line-height: 1.15;
    }

    .home-overlay p {
      font-size: 15px;
      line-height: 1.6;
    }

    .home-buttons {
      flex-direction: column;
      align-items: center;
    }

    .home-button {
      width: 220px;
    }

  }

</style>
