<!DOCTYPE html>
<html>
<head>
  <title>Alan Miller Guitars</title>

  <script src="https://unpkg.com/netlify-identity-widget@1/build/netlify-identity-widget.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    setTimeout(() => {
      window.location.href = "/about.html";
    }, 1000);
  </script>
</head>
<body>
</body>
</html>
